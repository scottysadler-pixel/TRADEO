name: Deploy Standalone App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aud_strategy/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -r aud_strategy/requirements.txt

      - name: Fetch AUD/USD prices
        run: npm run fetch:price

      - name: Fetch Google Trends
        run: python scripts/fetchTrends.py || echo "Trends fetch skipped"

      - name: Fetch news sentiment (GDELT + VADER)
        run: python aud_strategy/scripts/fetch_news_gdelt.py || echo "News fetch skipped, using existing sentiment"

      - name: Fetch gold and interest rates
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python aud_strategy/scripts/fetch_real_data.py

      - name: Merge CSVs and run backtest
        run: |
          npm run join:daily -- --trends data/trends.csv --sentiment data/sentiment.csv --out data/audusd_merged.csv
          python aud_strategy/run.py --simple

      - name: Update trading apps
        run: |
          python scripts/update_chameleon.py
          python scripts/update_catchup.py

      - name: Build standalone bundle
        run: npx tsx scripts/trial.ts --no-gemini-fetch --no-gemini-brief

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: standalone

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
